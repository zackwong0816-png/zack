<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会员中心 · NOVA</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-layout {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow);
    }
    .auth-logo {
      text-align: center;
      font-family: var(--font-display);
      font-size: 28px;
      margin-bottom: 32px;
    }
    .auth-title {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .auth-tab.active { color: var(--fg); border-color: var(--accent); }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 13px;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .social-login {
      display: flex;
      gap: 12px;
    }
    .social-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .social-btn:hover { border-color: var(--fg); }
    .member-sidebar {
      width: 240px;
      flex-shrink: 0;
    }
    .member-menu {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 8px;
    }
    .member-menu a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      color: var(--muted);
      transition: all 0.2s;
    }
    .member-menu a:hover, .member-menu a.active {
      background: var(--bg);
      color: var(--fg);
    }
    .member-menu a.active { font-weight: 500; }
    .member-content { flex: 1; }
    .member-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      margin-bottom: 24px;
    }
    .member-avatar {
      width: 64px;
      height: 64px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .member-info h2 { font-size: 20px; margin-bottom: 4px; }
    .member-info p { color: var(--muted); font-size: 13px; }
    .member-level {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: linear-gradient(135deg, var(--accent), #e07a5f);
      color: white;
      border-radius: 999px;
      font-size: 12px;
      margin-top: 8px;
    }
    .member-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 768px) {
      .member-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .stat-card-value {
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 600;
      color: var(--accent);
    }
    .stat-card-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    .member-section {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 24px;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .section-title { font-size: 16px; font-weight: 600; }
    .order-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .order-item:last-child { border-bottom: none; }
    .order-img {
      width: 80px;
      height: 80px;
      background: #f5f5f5;
      border-radius: var(--radius);
    }
    .order-info { flex: 1; }
    .order-info h4 { font-size: 14px; margin-bottom: 4px; }
    .order-info p { color: var(--muted); font-size: 12px; }
    .order-status {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
    }
    .order-status.pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .order-status.shipped { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
    .order-status.completed { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .member-layout {
      display: flex;
      gap: 32px;
      padding: 40px 0;
    }
    @media (max-width: 768px) {
      .member-layout { flex-direction: column; }
      .member-sidebar { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="topnav">
    <div class="container topnav-inner">
      <a href="index.html" class="logo">NOVA</a>
      <nav class="nav-links">
        <a href="products.html">产品</a>
        <a href="about.html">品牌</a>
        <a href="content.html">内容</a>
        <a href="stores.html">门店</a>
        <a href="contact.html">联系我们</a>
      </nav>
      <div class="nav-actions">
        <a href="member.html" class="btn btn-ghost">登录</a>
        <a href="cart.html" class="btn btn-ghost">🛒</a>
      </div>
    </div>
  </header>

  <main>
    <div class="container" id="main-content">
      <!-- Content will be rendered by JS -->
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding:0;">
        <span>© 2026 NOVA Design Co. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    function renderAuth() {
      const action = NOVA.Utils.getUrlParam('action') || 'login';
      const isLogin = action !== 'register';

      document.getElementById('main-content').innerHTML = `
        <div class="auth-layout">
          <div class="auth-card">
            <div class="auth-logo">NOVA</div>
            <div class="auth-tabs">
              <span class="auth-tab ${isLogin ? 'active' : ''}" data-tab="login">登录</span>
              <span class="auth-tab ${!isLogin ? 'active' : ''}" data-tab="register">注册</span>
            </div>
            <form class="auth-form ${isLogin ? 'active' : ''}" id="login-form">
              <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="tel" class="form-input" placeholder="请输入手机号" required>
              </div>
              <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" placeholder="请输入密码" required>
              </div>
              <div style="text-align:right;margin-bottom:16px;">
                <a href="#" style="color:var(--accent);font-size:13px;">忘记密码？</a>
              </div>
              <button type="submit" class="btn btn-primary" style="width:100%;">登录</button>
              <div class="auth-divider">其他方式</div>
              <div class="social-login">
                <button type="button" class="social-btn">微信</button>
                <button type="button" class="social-btn">支付宝</button>
              </div>
            </form>
            <form class="auth-form ${!isLogin ? 'active' : ''}" id="register-form">
              <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="tel" class="form-input" placeholder="请输入手机号" required>
              </div>
              <div class="form-group">
                <label class="form-label">验证码</label>
                <div style="display:flex;gap:8px;">
                  <input type="text" class="form-input" placeholder="请输入验证码" required style="flex:1;">
                  <button type="button" class="btn btn-secondary" style="white-space:nowrap;">获取验证码</button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">设置密码</label>
                <input type="password" class="form-input" placeholder="请设置密码" required>
              </div>
              <button type="submit" class="btn btn-primary" style="width:100%;">注册</button>
              <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:16px;">
                注册即表示同意<a href="#" style="color:var(--accent);">《用户协议》</a>和<a href="#" style="color:var(--accent);">《隐私政策》</a>
              </p>
            </form>
          </div>
        </div>
      `;

      // Tab switching
      document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
          this.classList.add('active');
          document.getElementById(this.dataset.tab + '-form').classList.add('active');
        });
      });

      // Form handlers
      document.getElementById('login-form').onsubmit = function(e) {
        e.preventDefault();
        var phone = this.querySelector('input[type="tel"]').value.trim();
        var password = this.querySelector('input[type="password"]').value;
        var member = NOVA.Member.login(phone, password);
        if (member) renderMember();
      };

      document.getElementById('register-form').onsubmit = function(e) {
        e.preventDefault();
        var phone = this.querySelector('input[type="tel"]').value.trim();
        var password = this.querySelectorAll('input[type="password"]')[1].value;
        if (!phone || !password) { NOVA.Utils.toast('请填写完整信息'); return; }
        if (!/^1[3-9]\d{9}$/.test(phone)) { NOVA.Utils.toast('请输入有效手机号'); return; }
        if (password.length < 6) { NOVA.Utils.toast('密码至少6位'); return; }
        var member = NOVA.Member.register({ nickname: '用户'+phone.slice(-4), phone: phone, password: password });
        if (member) renderMember();
      };
    }

    function renderMember() {
      const member = NOVA.Member.getInfo();
      if (!member) {
        renderAuth();
        return;
      }

      var myOrders = NOVA.Member.getOrders().filter(function(o){ return o.user === member.nickname || o.phone === member.phone; }).slice(0, 5);
      var pendingCount = myOrders.filter(function(o){ return o.status === 'pending' || o.status === 'paid' || o.status === 'shipped'; }).length;
      var coupons = JSON.parse(localStorage.getItem('nova_coupons') || '[]').filter(function(c){ return c.status === 'active'; }).length;

      document.getElementById('main-content').innerHTML = `
        <div class="member-layout">
          <aside class="member-sidebar">
            <nav class="member-menu">
              <a href="#" class="active">📊 会员中心</a>
              <a href="#">📦 我的订单</a>
              <a href="#">❤️ 我的收藏</a>
              <a href="#">🎫 优惠券</a>
              <a href="#">📍 地址管理</a>
              <a href="#">⚙️ 账户设置</a>
              <a href="#" onclick="NOVA.Member.logout();renderAuth();return false;">🚪 退出登录</a>
            </nav>
          </aside>
          <div class="member-content">
            <div class="member-header">
              <div class="member-avatar">${NOVA.Utils.escapeHtml(member.nickname).charAt(0)}</div>
              <div class="member-info">
                <h2>${NOVA.Utils.escapeHtml(member.nickname)}</h2>
                <p>${NOVA.Utils.escapeHtml(member.phone)}</p>
                <span class="member-level">⭐ ${member.level === 'gold' ? '黄金会员' : '普通会员'}</span>
              </div>
            </div>
            <div class="member-grid">
              <div class="stat-card">
                <div class="stat-card-value">${member.points.toLocaleString()}</div>
                <div class="stat-card-label">积分余额</div>
              </div>
              <div class="stat-card">
                <div class="stat-card-value">` + coupons + `</div>
                <div class="stat-card-label">优惠券</div>
              </div>
              <div class="stat-card">
                <div class="stat-card-value">` + myOrders.length + `</div>
                <div class="stat-card-label">全部订单</div>
              </div>
              <div class="stat-card">
                <div class="stat-card-value">` + pendingCount + `</div>
                <div class="stat-card-label">待处理</div>
              </div>
            </div>
            <div class="member-section">
              <div class="section-header">
                <h3 class="section-title">我的订单</h3>
              </div>
              <div id="member-orders"></div>
            </div>
          </div>
        </div>
      `;

      var ordersHtml = '';
      if (!myOrders.length) {
        ordersHtml = '<p style="color:var(--muted);font-size:14px;padding:20px 0;">暂无订单，<a href="products.html" style="color:var(--accent);">去购物</a></p>';
      } else {
        var statusMap = { pending:'待付款', paid:'待发货', shipped:'已发货', completed:'已完成', cancelled:'已取消' };
        var statusClass = { pending:'pending', paid:'pending', shipped:'shipped', completed:'completed', cancelled:'completed' };
        ordersHtml = myOrders.map(function(o) {
          var prods = (o.products||[]).map(function(p){ return p.name + ' x' + p.qty; }).join('、');
          return '<div class="order-item"><div class="order-img"></div><div class="order-info"><h4>' + (prods||'商品') + '</h4><p>' + o.date + ' · ' + o.id + '</p></div><span class="order-status ' + (statusClass[o.status]||'') + '">' + (statusMap[o.status]||o.status) + '</span></div>';
        }).join('');
      }
      document.getElementById('member-orders').innerHTML = ordersHtml;
    }

    // Check login status
    if (NOVA.Member.isLoggedIn()) {
      renderMember();
    } else {
      renderAuth();
    }
  </script>
</body>
</html>
