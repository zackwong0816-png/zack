name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - run: npm run build
      - run: sleep 120 && node dist/main > /tmp/server.log 2>&1 &
      - run: |
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://localhost:3000/api > /dev/null 2>&1; then
              echo "API is up!"
              cat /tmp/server.log | tail -5
              exit 0
            fi
            echo "Waiting... $i/30"
          done
          echo "API failed"
          cat /tmp/server.log | tail -20
          exit 1
        env:
          MONGODB_URI: mongodb://localhost:27017/nova
          JWT_SECRET: test-jwt-secret
          ADMIN_USER: admin
          ADMIN_PASS: admin123

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: cd frontend && npm install
      - run: cd frontend && npm run build || true
      - run: cd frontend && npx vue-tsc --noEmit || true
