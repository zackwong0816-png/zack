name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - run: npm run build

      - run: sleep 120
        env:
          MONGODB_URI: mongodb://localhost:27017/nova
          JWT_SECRET: test-jwt-secret
          ADMIN_USER: admin
          ADMIN_PASS: admin123

      - run: |
          nohup node dist/main > /tmp/server.log 2>&1 &
          echo "Server started with PID $!"
          for i in $(seq 1 30); do
            sleep 2
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/api 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "API is up! (attempt $i)"
              exit 0
            fi
          done
          echo "API failed to respond"
          cat /tmp/server.log | tail -10
          exit 1
        env:
          MONGODB_URI: mongodb://localhost:27017/nova
          JWT_SECRET: test-jwt-secret
          ADMIN_USER: admin
          ADMIN_PASS: admin123

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: cd frontend && npm install
      - run: cd frontend && npm run build || true
      - run: cd frontend && npx vue-tsc --noEmit || true
