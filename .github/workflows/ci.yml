name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - run: npm run build

      - run: |
          sleep 120
        env:
          MONGODB_URI: mongodb://localhost:27017/nova
          JWT_SECRET: test-jwt-secret
          ADMIN_USER: admin
          ADMIN_PASS: admin123

      - run: |
          echo "=== Starting server (30s foreground test) ==="
          timeout 30 node dist/main 2>&1 | tee /tmp/server_output.txt
          echo "=== Server exited (or timeout) ==="
        env:
          MONGODB_URI: mongodb://localhost:27017/nova
          JWT_SECRET: test-jwt-secret
          ADMIN_USER: admin
          ADMIN_PASS: admin123

      - uses: actions/upload-artifact@v4
        with:
          name: server-output
          path: /tmp/server_output.txt
          retention-days: 1

      - run: |
          echo "=== Server output ==="
          cat /tmp/server_output.txt || echo "(missing)"
          echo "=== Process list ==="
          ps aux | grep node | grep -v grep || echo "No node process"
          echo "=== Starting background server ==="
          nohup node dist/main > /tmp/server.log 2>&1 &
          echo "Server PID: $!"
          sleep 10
          echo "=== After 10s ==="
          ps aux | grep node | grep -v grep || echo "No node process"
          echo "=== Server log ==="
          cat /tmp/server.log || echo "(missing)"
        env:
          MONGODB_URI: mongodb://localhost:27017/nova
          JWT_SECRET: test-jwt-secret
          ADMIN_USER: admin
          ADMIN_PASS: admin123

      - run: |
          echo "=== Health check ==="
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/api 2>/dev/null || echo "000")
            echo "Attempt $i/30: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "API is up!"
              exit 0
            fi
            sleep 2
          done
          echo "API failed"
          cat /tmp/server.log | tail -20
          exit 1
        env:
          MONGODB_URI: mongodb://localhost:27017/nova
          JWT_SECRET: test-jwt-secret
          ADMIN_USER: admin
          ADMIN_PASS: admin123

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: cd frontend && npm install
      - run: cd frontend && npm run build || true
      - run: cd frontend && npx vue-tsc --noEmit || true
