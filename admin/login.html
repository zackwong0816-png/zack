<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA CMS - 管理员登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-wrap { width: 100%; max-width: 400px; padding: 20px; }
    .login-logo { text-align: center; margin-bottom: 40px; }
    .login-logo h1 { font-size: 28px; color: #fff; letter-spacing: 4px; }
    .login-logo span { color: #888; font-size: 12px; letter-spacing: 2px; }
    .login-card { background: #1a1a1a; border-radius: 16px; padding: 40px; border: 1px solid #2a2a2a; }
    .login-card h2 { color: #fff; font-size: 20px; margin-bottom: 8px; }
    .login-card p { color: #666; font-size: 13px; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; color: #888; font-size: 12px; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 14px 16px; background: #0f0f0f; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 15px; transition: border 0.2s; }
    .form-input:focus { outline: none; border-color: #e07b39; }
    .form-input::placeholder { color: #444; }
    .btn-login { width: 100%; padding: 14px; background: #e07b39; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: background 0.2s; }
    .btn-login:hover { background: #c96a2d; }
    .login-tip { margin-top: 24px; text-align: center; font-size: 12px; color: #555; }
    .login-tip a { color: #e07b39; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <h1>NOVA</h1>
      <span>CONTENT MANAGEMENT SYSTEM</span>
    </div>
    <div class="login-card">
      <h2>管理员登录</h2>
      <p>请输入账号信息登录后台管理系统</p>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">管理员账号</label>
          <input type="text" class="form-input" id="username" placeholder="请输入账号" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">登录密码</label>
          <input type="password" class="form-input" id="password" placeholder="请输入密码" autocomplete="off">
        </div>
        <button type="submit" class="btn-login">登 录</button>
      </form>
    </div>
  </div>
  <script>
    var Utils = {
      storage: {
        get: function(k){ try{ return JSON.parse(localStorage.getItem(k)); } catch(e){ return null; } },
        set: function(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
      }
    };
    if (sessionStorage.getItem('nova_admin')) {
      location.href = 'index.html';
    }
    var ADM_KEY = 'nova_admin_cred';
    var cred = Utils.storage.get(ADM_KEY);
    if (!cred) {
      cred = { username: 'admin', password: '' };
      Utils.storage.set(ADM_KEY, cred);
    }
    document.getElementById('login-form').onsubmit = function(e) {
      e.preventDefault();
      var u = document.getElementById('username').value.trim();
      var p = document.getElementById('password').value;
      if (!u || !p) { alert('请输入账号和密码'); return; }
      if (u === cred.username && p === cred.password) {
        sessionStorage.setItem('nova_admin', '1');
        location.href = 'index.html';
      } else {
        alert('账号或密码错误');
      }
    };
  </script>
</body>
</html>
