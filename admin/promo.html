<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>促销活动 · NOVA CMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c; --border: #2a2a2a; --text: #e0e0e0; --muted: #666; --accent: #e07b39; --green: #48bb78; --red: #f56565; --yellow: #ecc94b; --sidebar-w: 220px; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); position: fixed; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
    .sidebar-logo { padding: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo h1 { font-size: 20px; color: #fff; letter-spacing: 3px; }
    .sidebar-logo span { font-size: 10px; color: var(--muted); }
    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-group { margin-bottom: 8px; }
    .nav-group-title { padding: 8px 20px; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: #999; font-size: 13px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--surface2); color: var(--accent); border-left-color: var(--accent); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .main { flex: 1; margin-left: var(--sidebar-w); }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar h2 { font-size: 15px; }
    .breadcrumb { color: var(--muted); font-size: 13px; }
    .admin-avatar { width: 36px; height: 36px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; cursor: pointer; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .content { padding: 24px; }
    .panel { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; }
    .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-size: 14px; font-weight: 500; }
    .panel-body { padding: 20px; }
    .btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: none; }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: transparent; color: #999; border: 1px solid var(--border); }
    .btn-danger { background: rgba(245,101,101,0.15); color: var(--red); }
    .btn-success { background: rgba(72,187,120,0.15); color: var(--green); }
    .promo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    @media (max-width: 1100px) { .promo-grid { grid-template-columns: 1fr; } }
    .promo-card { background: var(--surface2); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    .promo-header { padding: 20px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); }
    .promo-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .promo-desc { font-size: 12px; color: var(--muted); }
    .promo-time { font-size: 11px; color: var(--muted); text-align: right; }
    .promo-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); }
    .promo-stat { background: var(--surface2); padding: 16px; text-align: center; }
    .promo-stat .val { font-size: 20px; font-weight: 600; color: #fff; }
    .promo-stat .label { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .promo-actions { display: flex; gap: 8px; padding: 16px 20px; }
    .status { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
    .status-success { background: rgba(72,187,120,0.15); color: var(--green); }
    .status-warning { background: rgba(236,201,75,0.15); color: var(--yellow); }
    .status-error { background: rgba(245,101,101,0.15); color: var(--red); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: var(--surface); border-radius: 12px; padding: 28px; width: 500px; max-width: 90%; border: 1px solid var(--border); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 16px; font-weight: 500; }
    .modal-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; color: var(--muted); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
    .form-select { appearance: none; cursor: pointer; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .hidden { display: none !important; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: var(--bg); padding: 14px 20px; border-radius: 8px; font-size: 13px; z-index: 2000; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><h1>NOVA</h1><span>CMS ADMIN</span></div>
      <nav class="sidebar-nav">
        <div class="nav-group"><div class="nav-group-title">主面板</div>
          <a class="nav-item" href="index.html"><span class="nav-icon">📊</span> 工作台</a>
          <a class="nav-item" href="analytics.html"><span class="nav-icon">📈</span> 数据统计</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">内容管理</div>
          <a class="nav-item" href="pages.html"><span class="nav-icon">📄</span> 页面管理</a>
          <a class="nav-item" href="media.html"><span class="nav-icon">🖼️</span> 素材中心</a>
          <a class="nav-item" href="content.html"><span class="nav-icon">📝</span> 内容管理</a>
          <a class="nav-item" href="messages.html"><span class="nav-icon">💬</span> 留言管理</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">商品管理</div>
          <a class="nav-item" href="products.html"><span class="nav-icon">📦</span> 产品管理</a>
          <a class="nav-item" href="categories.html"><span class="nav-icon">🏷️</span> 分类管理</a>
          <a class="nav-item" href="inventory.html"><span class="nav-icon">📋</span> 库存管理</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">用户与订单</div>
          <a class="nav-item" href="members.html"><span class="nav-icon">👥</span> 会员管理</a>
          <a class="nav-item" href="orders.html"><span class="nav-icon">🛒</span> 订单管理</a>
          <a class="nav-item" href="stores.html"><span class="nav-icon">🏪</span> 门店管理</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">营销工具</div>
          <a class="nav-item" href="coupon.html"><span class="nav-icon">🎫</span> 优惠券</a>
          <a class="nav-item active" href="promo.html"><span class="nav-icon">🔥</span> 促销活动</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">系统</div>
          <a class="nav-item" href="settings.html"><span class="nav-icon">⚙️</span> 设置</a>
          <a class="nav-item" href="login.html"><span class="nav-icon">🚪</span> 退出</a>
        </div>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left"><h2>NOVA 管理后台</h2><span class="breadcrumb">/ 营销工具 / 促销活动</span></div>
        <div class="topbar-right">
          <button class="btn btn-primary" onclick="openModal()">+ 创建活动</button>
          <div class="admin-avatar">管</div>
        </div>
      </header>

      <div class="content">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">🔥 促销活动列表</span></div>
          <div class="panel-body">
            <div class="promo-grid" id="promo-grid"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay hidden" id="promo-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">创建促销活动</span>
        <div class="modal-close" onclick="closeModal()">×</div>
      </div>
      <div class="form-group">
        <label class="form-label">活动名称 *</label>
        <input type="text" class="form-input" id="p-name" placeholder="例如：五一黄金周特惠">
      </div>
      <div class="form-group">
        <label class="form-label">活动描述</label>
        <input type="text" class="form-input" id="p-desc" placeholder="简要描述活动内容">
      </div>
      <div class="modal-grid">
        <div class="form-group">
          <label class="form-label">开始时间</label>
          <input type="date" class="form-input" id="p-start">
        </div>
        <div class="form-group">
          <label class="form-label">结束时间</label>
          <input type="date" class="form-input" id="p-end">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">活动类型</label>
        <select class="form-select" id="p-type">
          <option value="flash">限时秒杀</option>
          <option value="group">拼团</option>
          <option value="bundle">满额赠礼</option>
          <option value="direct">直接折扣</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="savePromo()">创建</button>
      </div>
    </div>
  </div>

  <script>
    if (!sessionStorage.getItem('nova_admin')) location.href = 'login.html';
    const PROMOS_KEY = 'nova_promos';
    let promos = JSON.parse(localStorage.getItem(PROMOS_KEY) || 'null') || [
      { id: 'pm1', name: '五一黄金周特惠', desc: '全场8折起，最高减100元', type: 'direct', start: '2026-05-01', end: '2026-05-07', status: 'upcoming', views: 8560, orders: 234, sales: 45600 },
      { id: 'pm2', name: '春季家装节', desc: '家具类满2000减300', type: 'direct', start: '2026-03-01', end: '2026-03-31', status: 'ended', views: 12800, orders: 567, sales: 128000 },
      { id: 'pm3', name: '新品首发闪购', desc: '极简陶瓷餐具套装限时7折', type: 'flash', start: '2026-04-28', end: '2026-04-28', status: 'active', views: 4200, orders: 89, sales: 28560 },
    ];
    save();
    function save() { localStorage.setItem(PROMOS_KEY, JSON.stringify(promos)); }
    function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => { t.style.animation = 'slideIn 0.3s ease reverse'; setTimeout(() => t.remove(), 300); }, 2500); }

    function getStatus(status, start, end) {
      const now = new Date();
      if (now < new Date(start)) return ['未开始', 'status-warning'];
      if (now > new Date(end)) return ['已结束', 'status-error'];
      return ['进行中', 'status-success'];
    }

    function getTypeName(type) {
      const map = { flash: '限时秒杀', group: '拼团', bundle: '满额赠礼', direct: '直接折扣' };
      return map[type] || type;
    }

    function render() {
      document.getElementById('promo-grid').innerHTML = promos.map(p => {
        const [label, cls] = getStatus(p.status, p.start, p.end);
        return `<div class="promo-card">
          <div class="promo-header">
            <div>
              <div class="promo-name">${p.name}</div>
              <div class="promo-desc">${p.desc} · ${getTypeName(p.type)}</div>
            </div>
            <div style="text-align:right;">
              <span class="status ${cls}">${label}</span>
              <div class="promo-time">${p.start} ~ ${p.end}</div>
            </div>
          </div>
          <div class="promo-stats">
            <div class="promo-stat"><div class="val">${p.views.toLocaleString()}</div><div class="label">浏览</div></div>
            <div class="promo-stat"><div class="val">${p.orders}</div><div class="label">订单</div></div>
            <div class="promo-stat"><div class="val">¥${(p.sales/1000).toFixed(1)}k</div><div class="label">销售额</div></div>
          </div>
          <div class="promo-actions">
            <button class="btn btn-ghost btn-sm" onclick="deletePromo('${p.id}')">删除</button>
          </div>
        </div>`;
      }).join('');
    }

    function openModal() { document.getElementById('promo-modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('promo-modal').classList.add('hidden'); }
    function savePromo() {
      const name = document.getElementById('p-name').value.trim();
      if (!name) { toast('请填写活动名称'); return; }
      promos.unshift({ id: 'pm_' + Date.now(), name, desc: document.getElementById('p-desc').value, type: document.getElementById('p-type').value, start: document.getElementById('p-start').value, end: document.getElementById('p-end').value, status: 'upcoming', views: 0, orders: 0, sales: 0 });
      save(); closeModal(); render(); toast('活动已创建');
    }
    function deletePromo(id) { if (!confirm('确定删除此活动？')) return; promos = promos.filter(x => x.id !== id); save(); render(); toast('活动已删除'); }
    document.querySelector('.admin-avatar').addEventListener('click', function() { if (confirm('确定要退出登录吗？')) location.href = 'login.html'; });
    render();
  </script>
</body>
</html>
