<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>门店管理 · NOVA CMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c; --border: #2a2a2a; --text: #e0e0e0; --muted: #666; --accent: #e07b39; --green: #48bb78; --red: #f56565; --yellow: #ecc94b; --sidebar-w: 220px; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); position: fixed; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
    .sidebar-logo { padding: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo h1 { font-size: 20px; color: #fff; letter-spacing: 3px; }
    .sidebar-logo span { font-size: 10px; color: var(--muted); }
    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-group { margin-bottom: 8px; }
    .nav-group-title { padding: 8px 20px; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: #999; font-size: 13px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--surface2); color: var(--accent); border-left-color: var(--accent); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .main { flex: 1; margin-left: var(--sidebar-w); }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar h2 { font-size: 15px; }
    .breadcrumb { color: var(--muted); font-size: 13px; }
    .admin-avatar { width: 36px; height: 36px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; cursor: pointer; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .content { padding: 24px; }
    .panel { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; }
    .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-size: 14px; font-weight: 500; }
    .panel-body { padding: 20px; }
    .btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: none; }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: transparent; color: #999; border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: rgba(245,101,101,0.15); color: var(--red); }
    .btn-success { background: rgba(72,187,120,0.15); color: var(--green); }
    .btn-warning { background: rgba(236,201,75,0.15); color: var(--yellow); }
    .store-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    @media (max-width: 1100px) { .store-grid { grid-template-columns: 1fr; } }
    .store-card { background: var(--surface2); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    .store-map { height: 160px; background: var(--bg); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; border-bottom: 1px solid var(--border); }
    .store-info { padding: 20px; }
    .store-name { font-size: 16px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .store-meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .store-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
    .store-tag { padding: 3px 8px; background: var(--bg); border-radius: 4px; font-size: 11px; color: var(--muted); }
    .store-tag.new { background: rgba(224,123,57,0.15); color: var(--accent); }
    .store-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .status { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
    .status-success { background: rgba(72,187,120,0.15); color: var(--green); }
    .status-warning { background: rgba(236,201,75,0.15); color: var(--yellow); }
    .status-error { background: rgba(245,101,101,0.15); color: var(--red); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: var(--surface); border-radius: 12px; padding: 28px; width: 550px; max-width: 90%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 16px; font-weight: 500; }
    .modal-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; color: var(--muted); }
    .modal-close:hover { background: var(--surface2); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-select { appearance: none; cursor: pointer; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: 12px; }
    .hidden { display: none !important; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: var(--bg); padding: 14px 20px; border-radius: 8px; font-size: 13px; z-index: 2000; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><h1>NOVA</h1><span>CMS ADMIN</span></div>
      <nav class="sidebar-nav">
        <div class="nav-group"><div class="nav-group-title">主面板</div>
          <a class="nav-item" href="index.html"><span class="nav-icon">📊</span> 工作台</a>
          <a class="nav-item" href="analytics.html"><span class="nav-icon">📈</span> 数据统计</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">内容管理</div>
          <a class="nav-item" href="pages.html"><span class="nav-icon">📄</span> 页面管理</a>
          <a class="nav-item" href="media.html"><span class="nav-icon">🖼️</span> 素材中心</a>
          <a class="nav-item" href="content.html"><span class="nav-icon">📝</span> 内容管理</a>
          <a class="nav-item" href="messages.html"><span class="nav-icon">💬</span> 留言管理</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">商品管理</div>
          <a class="nav-item" href="products.html"><span class="nav-icon">📦</span> 产品管理</a>
          <a class="nav-item" href="categories.html"><span class="nav-icon">🏷️</span> 分类管理</a>
          <a class="nav-item" href="inventory.html"><span class="nav-icon">📋</span> 库存管理</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">用户与订单</div>
          <a class="nav-item" href="members.html"><span class="nav-icon">👥</span> 会员管理</a>
          <a class="nav-item" href="orders.html"><span class="nav-icon">🛒</span> 订单管理</a>
          <a class="nav-item active" href="stores.html"><span class="nav-icon">🏪</span> 门店管理</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">营销工具</div>
          <a class="nav-item" href="coupon.html"><span class="nav-icon">🎫</span> 优惠券</a>
          <a class="nav-item" href="promo.html"><span class="nav-icon">🔥</span> 促销活动</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">系统</div>
          <a class="nav-item" href="settings.html"><span class="nav-icon">⚙️</span> 设置</a>
          <a class="nav-item" href="login.html"><span class="nav-icon">🚪</span> 退出</a>
        </div>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h2>NOVA 管理后台</h2>
          <span class="breadcrumb">/ 用户与订单 / 门店管理</span>
        </div>
        <div class="topbar-right">
          <button class="btn btn-primary" onclick="openStoreModal()">+ 添加门店</button>
          <div class="admin-avatar">管</div>
        </div>
      </header>

      <div class="content">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">🏪 门店列表</span>
            <span class="text-sm text-muted">共 <span id="total-count">0</span> 家门店</span>
          </div>
          <div class="panel-body">
            <div class="store-grid" id="store-grid"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay hidden" id="store-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">添加门店</span>
        <div class="modal-close" onclick="closeStoreModal()">×</div>
      </div>
      <div class="form-group">
        <label class="form-label">门店名称 *</label>
        <input type="text" class="form-input" id="s-name" placeholder="例如：NOVA 上海旗舰店">
      </div>
      <div class="modal-grid">
        <div class="form-group">
          <label class="form-label">城市</label>
          <input type="text" class="form-input" id="s-city" placeholder="上海">
        </div>
        <div class="form-group">
          <label class="form-label">区域</label>
          <input type="text" class="form-input" id="s-district" placeholder="静安区">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">详细地址 *</label>
        <input type="text" class="form-input" id="s-address" placeholder="上海市静安区南京西路1788号">
      </div>
      <div class="modal-grid">
        <div class="form-group">
          <label class="form-label">联系电话</label>
          <input type="tel" class="form-input" id="s-phone" placeholder="021-6288-8888">
        </div>
        <div class="form-group">
          <label class="form-label">营业时间</label>
          <input type="text" class="form-input" id="s-hours" placeholder="10:00 - 22:00">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">门店类型</label>
        <select class="form-select" id="s-type">
          <option value="direct">直营店</option>
          <option value="franchise">加盟店</option>
          <option value="flagship">旗舰店</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">门店状态</label>
        <select class="form-select" id="s-status">
          <option value="open">营业中</option>
          <option value="closed">已关闭</option>
          <option value="renovating">装修中</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">门店描述</label>
        <textarea class="form-textarea" id="s-desc" placeholder="门店特色、设施介绍等"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeStoreModal()">取消</button>
        <button class="btn btn-primary" onclick="saveStore()">保存</button>
      </div>
    </div>
  </div>

  <script>
    if (!sessionStorage.getItem('nova_admin')) location.href = 'login.html';

    const STORES_KEY = 'nova_stores';
    let stores = JSON.parse(localStorage.getItem(STORES_KEY) || 'null') || [
      { id: 's1', name: 'NOVA 上海旗舰店', city: '上海', district: '静安区', address: '上海市静安区南京西路1788号', phone: '021-6288-8888', hours: '10:00 - 22:00', type: 'flagship', status: 'open', desc: '品牌最大旗舰店，涵盖全品类产品', features: ['支持预约', '有停车场', '礼品包装'] },
      { id: 's2', name: 'NOVA 北京三里屯店', city: '北京', district: '朝阳区', address: '北京市朝阳区三里屯路19号院', phone: '010-6417-8888', hours: '10:00 - 21:00', type: 'direct', status: 'open', desc: '位于三里屯核心商圈', features: ['支持预约'] },
      { id: 's3', name: 'NOVA 深圳万象城店', city: '深圳', district: '罗湖区', address: '深圳市罗湖区宝安南路万象城F1', phone: '0755-8266-8888', hours: '10:00 - 22:00', type: 'direct', status: 'renovating', desc: '最新开业门店', features: ['最新开业'], isNew: true },
      { id: 's4', name: 'NOVA 杭州西湖店', city: '杭州', district: '上城区', address: '杭州市上城区平海路100号', phone: '0571-8702-8888', hours: '10:00 - 21:30', type: 'direct', status: 'open', desc: '西湖边上的美学空间', features: ['支持预约', '有停车场'] },
    ];
    let editingId = null;

    save();

    function save() { localStorage.setItem(STORES_KEY, JSON.stringify(stores)); }

    function toast(msg) {
      const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.animation = 'slideIn 0.3s ease reverse'; setTimeout(() => t.remove(), 300); }, 2500);
    }

    function getStatusHtml(status) {
      const map = { open: ['营业中', 'status-success'], closed: ['已关闭', 'status-error'], renovating: ['装修中', 'status-warning'] };
      const [label, cls] = map[status] || ['未知', ''];
      return `<span class="status ${cls}">${label}</span>`;
    }

    function getTypeName(type) {
      const map = { direct: '直营店', flagship: '旗舰店', franchise: '加盟店' };
      return map[type] || type;
    }

    function renderStores() {
      document.getElementById('total-count').textContent = stores.length;
      const grid = document.getElementById('store-grid');
      grid.innerHTML = stores.map(s => `
        <div class="store-card">
          <div class="store-map">[ 地图位置 ] ${s.address}</div>
          <div class="store-info">
            <div class="store-name">
              ${s.name}
              ${s.isNew ? '<span class="store-tag new">新开业</span>' : ''}
            </div>
            <div class="store-meta">📍 ${s.city} · ${s.district}</div>
            <div class="store-meta">📞 ${s.phone}</div>
            <div class="store-meta">🕐 ${s.hours}</div>
            <div class="store-meta">🏷️ ${getTypeName(s.type)} ${getStatusHtml(s.status)}</div>
            <div class="store-tags">
              ${(s.features || []).map(f => `<span class="store-tag${f === '最新开业' ? ' new' : ''}">${f}</span>`).join('')}
            </div>
            <div class="store-actions">
              <button class="btn btn-ghost btn-sm" onclick="editStore('${s.id}')">✏️ 编辑</button>
              ${s.status === 'open' ? `<button class="btn btn-warning btn-sm" onclick="toggleStore('${s.id}', 'closed')">停业</button>` : `<button class="btn btn-success btn-sm" onclick="toggleStore('${s.id}', 'open')">营业</button>`}
              <button class="btn btn-danger btn-sm" onclick="deleteStore('${s.id}')">🗑️</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openStoreModal(id) {
      editingId = id;
      document.getElementById('modal-title').textContent = id ? '编辑门店' : '添加门店';
      if (id) {
        const s = stores.find(x => x.id === id);
        if (s) {
          document.getElementById('s-name').value = s.name;
          document.getElementById('s-city').value = s.city;
          document.getElementById('s-district').value = s.district;
          document.getElementById('s-address').value = s.address;
          document.getElementById('s-phone').value = s.phone;
          document.getElementById('s-hours').value = s.hours;
          document.getElementById('s-type').value = s.type;
          document.getElementById('s-status').value = s.status;
          document.getElementById('s-desc').value = s.desc || '';
        }
      } else {
        ['s-name','s-city','s-district','s-address','s-phone','s-hours','s-desc'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('s-type').value = 'direct';
        document.getElementById('s-status').value = 'open';
      }
      document.getElementById('store-modal').classList.remove('hidden');
    }

    function editStore(id) { openStoreModal(id); }
    function closeStoreModal() { document.getElementById('store-modal').classList.add('hidden'); editingId = null; }

    function saveStore() {
      const name = document.getElementById('s-name').value.trim();
      const address = document.getElementById('s-address').value.trim();
      if (!name || !address) { toast('请填写必填项'); return; }
      const data = {
        name, city: document.getElementById('s-city').value, district: document.getElementById('s-district').value,
        address, phone: document.getElementById('s-phone').value, hours: document.getElementById('s-hours').value,
        type: document.getElementById('s-type').value, status: document.getElementById('s-status').value,
        desc: document.getElementById('s-desc').value, features: []
      };
      if (editingId) {
        const idx = stores.findIndex(x => x.id === editingId);
        if (idx > -1) stores[idx] = { ...stores[idx], ...data };
      } else {
        data.id = 's_' + Date.now();
        stores.push(data);
      }
      save();
      closeStoreModal();
      renderStores();
      toast(editingId ? '门店已更新' : '门店已添加');
    }

    function toggleStore(id, status) {
      const s = stores.find(x => x.id === id);
      if (s) { s.status = status; save(); renderStores(); toast('状态已更新'); }
    }

    function deleteStore(id) {
      if (!confirm('确定删除此门店？')) return;
      stores = stores.filter(x => x.id !== id);
      save();
      renderStores();
      toast('门店已删除');
    }

    document.querySelector('.admin-avatar').addEventListener('click', function() { if (confirm('确定要退出登录吗？')) location.href = 'login.html'; });

    renderStores();
  </script>
</body>
</html>
