<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>素材中心 · NOVA CMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c; --border: #2a2a2a; --text: #e0e0e0; --muted: #666; --accent: #e07b39; --green: #48bb78; --red: #f56565; --yellow: #ecc94b; --sidebar-w: 220px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .admin-layout { display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); position: fixed; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
    .sidebar-logo { padding: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo h1 { font-size: 20px; color: #fff; letter-spacing: 3px; }
    .sidebar-logo span { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-group { margin-bottom: 8px; }
    .nav-group-title { padding: 8px 20px; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: #999; text-decoration: none; font-size: 13px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--surface2); color: var(--accent); border-left-color: var(--accent); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .main { flex: 1; margin-left: var(--sidebar-w); }
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar h2 { font-size: 15px; font-weight: 500; }
    .breadcrumb { color: var(--muted); font-size: 13px; }
    .admin-avatar { width: 36px; height: 36px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; cursor: pointer; }
    .content { padding: 24px; }
    .panel { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; }
    .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-size: 14px; font-weight: 500; }
    .panel-body { padding: 20px; }

    .btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: none; text-decoration: none; }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost { background: transparent; color: #999; border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: rgba(245,101,101,0.15); color: var(--red); }

    .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 48px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(224,123,57,0.05); }
    .upload-zone .icon { font-size: 40px; margin-bottom: 12px; }
    .upload-zone p { color: var(--muted); font-size: 13px; }
    .upload-zone strong { color: var(--accent); }

    .filter-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 999px; font-size: 12px; cursor: pointer; color: var(--muted); background: none; }
    .filter-btn:hover, .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .search-box { display: flex; gap: 8px; margin-left: auto; }
    .search-box input { padding: 8px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; width: 200px; }
    .search-box input:focus { outline: none; border-color: var(--accent); }

    .media-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
    @media (max-width: 1400px) { .media-grid { grid-template-columns: repeat(5, 1fr); } }
    @media (max-width: 1100px) { .media-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 768px) { .media-grid { grid-template-columns: repeat(3, 1fr); } }
    .media-item { background: var(--surface2); border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.15s; border: 2px solid transparent; position: relative; }
    .media-item:hover { border-color: var(--accent); transform: translateY(-2px); }
    .media-item.selected { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(224,123,57,0.2); }
    .media-thumb { aspect-ratio: 1; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; }
    .media-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .media-info { padding: 8px 10px; }
    .media-name { font-size: 11px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
    .media-meta { font-size: 10px; color: var(--muted); }
    .media-check { position: absolute; top: 6px; left: 6px; width: 20px; height: 20px; background: var(--accent); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 11px; color: #fff; }
    .media-item.selected .media-check { display: flex; }
    .media-actions { position: absolute; top: 6px; right: 6px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
    .media-item:hover .media-actions { opacity: 1; }
    .media-actions button { width: 24px; height: 24px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; }
    .media-actions .del { background: var(--red); color: #fff; }
    .media-actions .copy { background: var(--green); color: #fff; }

    .stat-row { display: flex; gap: 24px; margin-bottom: 24px; }
    .stat-item { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
    .stat-item .val { font-size: 28px; font-weight: 600; color: #fff; }
    .stat-item .label { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .stat-item .accent { color: var(--accent); }

    .selected-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; font-size: 13px; margin-bottom: 16px; }
    .selected-bar span { color: var(--accent); font-weight: 600; }

    .folder-tree { padding: 12px 0; }
    .folder-item { display: flex; align-items: center; gap: 8px; padding: 8px 20px; cursor: pointer; font-size: 13px; color: #999; }
    .folder-item:hover { background: var(--surface2); color: var(--text); }
    .folder-item.active { background: var(--surface2); color: var(--accent); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: var(--surface); border-radius: 12px; padding: 28px; width: 700px; max-width: 90%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 16px; font-weight: 500; }
    .modal-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; color: var(--muted); font-size: 18px; }
    .modal-close:hover { background: var(--surface2); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .form-input, .form-select { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }

    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-8 { gap: 8px; }
    .gap-16 { gap: 16px; }
    .mb-16 { margin-bottom: 16px; }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: 12px; }
    .hidden { display: none !important; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: var(--bg); padding: 14px 20px; border-radius: 8px; font-size: 13px; z-index: 2000; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    .upload-progress { height: 4px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden; }
    .upload-progress-bar { height: 100%; background: var(--accent); width: 0; transition: width 0.3s; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><h1>NOVA</h1><span>CMS ADMIN</span></div>
      <nav class="sidebar-nav">
        <div class="nav-group"><div class="nav-group-title">主面板</div>
          <a class="nav-item" href="index.html"><span class="nav-icon">📊</span> 工作台</a>
          <a class="nav-item" href="analytics.html"><span class="nav-icon">📈</span> 数据统计</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">内容管理</div>
          <a class="nav-item" href="pages.html"><span class="nav-icon">📄</span> 页面管理</a>
          <a class="nav-item active" href="media.html"><span class="nav-icon">🖼️</span> 素材中心</a>
          <a class="nav-item" href="content.html"><span class="nav-icon">📝</span> 内容管理</a>
          <a class="nav-item" href="messages.html"><span class="nav-icon">💬</span> 留言管理</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">商品管理</div>
          <a class="nav-item" href="products.html"><span class="nav-icon">📦</span> 产品管理</a>
          <a class="nav-item" href="categories.html"><span class="nav-icon">🏷️</span> 分类管理</a>
          <a class="nav-item" href="inventory.html"><span class="nav-icon">📋</span> 库存管理</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">用户与订单</div>
          <a class="nav-item" href="members.html"><span class="nav-icon">👥</span> 会员管理</a>
          <a class="nav-item" href="orders.html"><span class="nav-icon">🛒</span> 订单管理</a>
          <a class="nav-item" href="stores.html"><span class="nav-icon">🏪</span> 门店管理</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">营销工具</div>
          <a class="nav-item" href="coupon.html"><span class="nav-icon">🎫</span> 优惠券</a>
          <a class="nav-item" href="promo.html"><span class="nav-icon">🔥</span> 促销活动</a>
        </div>
        <div class="nav-group"><div class="nav-group-title">系统</div>
          <a class="nav-item" href="settings.html"><span class="nav-icon">⚙️</span> 设置</a>
          <a class="nav-item" href="login.html"><span class="nav-icon">🚪</span> 退出</a>
        </div>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h2>NOVA 管理后台</h2>
          <span class="breadcrumb">/ 内容管理 / 素材中心</span>
        </div>
        <div class="topbar-right">
          <button class="btn btn-ghost btn-sm" onclick="deleteSelected()" id="del-btn" disabled>🗑️ 删除 (<span id="sel-count">0</span>)</button>
          <button class="btn btn-primary btn-sm" onclick="openUploadModal()">⬆️ 上传素材</button>
          <div class="admin-avatar" title="管理员">管</div>
        </div>
      </header>

      <div class="content">
        <div class="stat-row">
          <div class="stat-item"><div class="val accent" id="stat-total">0</div><div class="label">素材总数</div></div>
          <div class="stat-item"><div class="val" id="stat-images">0</div><div class="label">图片</div></div>
          <div class="stat-item"><div class="val" id="stat-videos">0</div><div class="label">视频</div></div>
          <div class="stat-item"><div class="val" id="stat-size">0 MB</div><div class="label">总占用</div></div>
        </div>

        <div class="selected-bar hidden" id="selected-bar">
          已选择 <span id="sel-count2">0</span> 个素材
          <button class="btn btn-ghost btn-sm" onclick="clearSelection()">取消选择</button>
          <button class="btn btn-danger btn-sm" onclick="deleteSelected()">批量删除</button>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">🖼️ 素材库</span>
            <div class="flex gap-8">
              <select class="btn btn-ghost btn-sm" id="filter-type" onchange="renderMedia()">
                <option value="all">全部类型</option>
                <option value="image">图片</option>
                <option value="video">视频</option>
                <option value="doc">文档</option>
              </select>
            </div>
          </div>
          <div class="panel-body">
            <div class="filter-row">
              <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
              <button class="filter-btn" data-filter="image" onclick="setFilter('image')">🖼️ 图片</button>
              <button class="filter-btn" data-filter="video" onclick="setFilter('video')">🎬 视频</button>
              <button class="filter-btn" data-filter="doc" onclick="setFilter('doc')">📄 文档</button>
              <div class="search-box">
                <input type="text" placeholder="搜索素材名称..." id="search-input" oninput="renderMedia()">
              </div>
            </div>
            <div class="media-grid" id="media-grid"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay hidden" id="upload-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">上传素材</span>
        <div class="modal-close" onclick="closeUploadModal()">×</div>
      </div>
      <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="icon">📤</div>
        <p>拖拽文件到此处，或 <strong>点击选择文件</strong></p>
        <p class="text-sm text-muted" style="margin-top:8px;">支持 JPG、PNG、GIF、MP4、PDF，单文件不超过 20MB</p>
        <input type="file" id="file-input" multiple accept="image/*,video/*,.pdf" style="display:none;" onchange="handleFiles(this.files)">
      </div>
      <div id="upload-list"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeUploadModal()">关闭</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="detail-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="detail-title">素材详情</span>
        <div class="modal-close" onclick="closeDetailModal()">×</div>
      </div>
      <div id="detail-content"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeDetailModal()">关闭</button>
        <button class="btn btn-primary btn-sm" onclick="copyUrl()">📋 复制链接</button>
      </div>
    </div>
  </div>

  <script>
    if (!sessionStorage.getItem('nova_admin')) location.href = 'login.html';

    const MEDIA_KEY = 'nova_media';
    let media = JSON.parse(localStorage.getItem(MEDIA_KEY) || 'null') || [
      { id: 'm1', name: 'hero-banner.jpg', type: 'image', size: 1240000, url: '', date: '2026-04-28', tags: ['首页', '横幅'] },
      { id: 'm2', name: 'product-ceramic.jpg', type: 'image', size: 890000, url: '', date: '2026-04-27', tags: ['产品'] },
      { id: 'm3', name: 'about-hero.jpg', type: 'image', size: 1500000, url: '', date: '2026-04-25', tags: ['品牌'] },
      { id: 'm4', name: 'store-shanghai.jpg', type: 'image', size: 2100000, url: '', date: '2026-04-24', tags: ['门店'] },
      { id: 'm5', name: 'brand-video.mp4', type: 'video', size: 15800000, url: '', date: '2026-04-20', tags: ['视频'] },
      { id: 'm6', name: 'icon-pack.png', type: 'image', size: 340000, url: '', date: '2026-04-18', tags: ['图标'] },
    ];
    let selectedIds = new Set();
    let currentFilter = 'all';
    let currentDetail = null;

    save();

    function save() { localStorage.setItem(MEDIA_KEY, JSON.stringify(media)); }

    function toast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.animation = 'slideIn 0.3s ease reverse'; setTimeout(() => t.remove(), 300); }, 2500);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function getTypeIcon(type) {
      const icons = { image: '🖼️', video: '🎬', doc: '📄', audio: '🎵' };
      return icons[type] || '📎';
    }

    function updateStats() {
      const images = media.filter(m => m.type === 'image');
      const videos = media.filter(m => m.type === 'video');
      const totalSize = media.reduce((s, m) => s + m.size, 0);
      document.getElementById('stat-total').textContent = media.length;
      document.getElementById('stat-images').textContent = images.length;
      document.getElementById('stat-videos').textContent = videos.length;
      document.getElementById('stat-size').textContent = formatSize(totalSize);
    }

    function renderMedia() {
      const typeFilter = document.getElementById('filter-type').value;
      const search = document.getElementById('search-input').value.toLowerCase();
      const filtered = media.filter(m => {
        const matchType = (currentFilter === 'all' || m.type === currentFilter) && (typeFilter === 'all' || m.type === typeFilter);
        const matchSearch = !search || m.name.toLowerCase().includes(search);
        return matchType && matchSearch;
      });

      const grid = document.getElementById('media-grid');
      if (filtered.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);">暂无素材，点击上方按钮上传</div>';
        return;
      }

      grid.innerHTML = filtered.map(m => {
        const isSelected = selectedIds.has(m.id);
        return `<div class="media-item${isSelected ? ' selected' : ''}" data-id="${m.id}" onclick="toggleSelect('${m.id}', event)">
          <div class="media-check">✓</div>
          <div class="media-actions">
            <button class="del" onclick="event.stopPropagation(); deleteMedia('${m.id}')">×</button>
          </div>
          <div class="media-thumb" onclick="event.stopPropagation(); openDetail('${m.id}')">${getTypeIcon(m.type)}</div>
          <div class="media-info">
            <div class="media-name">${m.name}</div>
            <div class="media-meta">${formatSize(m.size)} · ${m.date}</div>
          </div>
        </div>`;
      }).join('');
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
      renderMedia();
    }

    function toggleSelect(id, e) {
      e.stopPropagation();
      if (selectedIds.has(id)) selectedIds.delete(id);
      else selectedIds.add(id);
      updateSelectionBar();
      renderMedia();
    }

    function updateSelectionBar() {
      const count = selectedIds.size;
      const bar = document.getElementById('selected-bar');
      const delBtn = document.getElementById('del-btn');
      bar.classList.toggle('hidden', count === 0);
      document.getElementById('sel-count').textContent = count;
      document.getElementById('sel-count2').textContent = count;
      delBtn.disabled = count === 0;
    }

    function clearSelection() { selectedIds.clear(); updateSelectionBar(); renderMedia(); }

    function deleteSelected() {
      if (selectedIds.size === 0) return;
      if (!confirm('确定删除选中的 ' + selectedIds.size + ' 个素材？')) return;
      media = media.filter(m => !selectedIds.has(m.id));
      selectedIds.clear();
      save();
      updateStats();
      updateSelectionBar();
      renderMedia();
      toast('已删除 ' + media.length + ' 个素材');
    }

    function deleteMedia(id) {
      if (!confirm('确定删除此素材？')) return;
      media = media.filter(m => m.id !== id);
      selectedIds.delete(id);
      save();
      updateStats();
      updateSelectionBar();
      renderMedia();
      toast('素材已删除');
    }

    function openDetail(id) {
      currentDetail = media.find(m => m.id === id);
      if (!currentDetail) return;
      document.getElementById('detail-title').textContent = currentDetail.name;
      document.getElementById('detail-content').innerHTML = `
        <div style="background:var(--surface2);border-radius:8px;padding:40px;text-align:center;margin-bottom:16px;font-size:60px;">${getTypeIcon(currentDetail.type)}</div>
        <div class="form-group"><label class="form-label">文件名</label><input class="form-input" value="${currentDetail.name}" id="detail-name"></div>
        <div class="form-group"><label class="form-label">标签</label><input class="form-input" value="${currentDetail.tags.join(', ')}" id="detail-tags" placeholder="用逗号分隔"></div>
        <div class="form-group"><label class="form-label">文件大小</label><input class="form-input" value="${formatSize(currentDetail.size)}" readonly></div>
        <div class="form-group"><label class="form-label">上传日期</label><input class="form-input" value="${currentDetail.date}" id="detail-date"></div>
      `;
      document.getElementById('detail-modal').classList.remove('hidden');
    }

    function closeDetailModal() { document.getElementById('detail-modal').classList.add('hidden'); }

    function copyUrl() {
      if (currentDetail) {
        navigator.clipboard.writeText('/uploads/' + currentDetail.name).then(() => toast('链接已复制！'));
      }
    }

    function openUploadModal() {
      document.getElementById('upload-modal').classList.remove('hidden');
    }

    function closeUploadModal() {
      document.getElementById('upload-modal').classList.add('hidden');
      document.getElementById('upload-list').innerHTML = '';
    }

    function handleFiles(files) {
      const list = document.getElementById('upload-list');
      list.innerHTML = '';
      Array.from(files).forEach(file => {
        const type = file.type.startsWith('image/') ? 'image' : file.type.startsWith('video/') ? 'video' : 'doc';
        const id = 'm_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
        const item = {
          id, name: file.name, type, size: file.size,
          url: URL.createObjectURL(file), date: new Date().toISOString().slice(0, 10), tags: []
        };
        media.unshift(item);
        save();
        list.innerHTML += `<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;display:flex;justify-content:space-between;">
          <span>${getTypeIcon(type)} ${file.name}</span><span style="color:var(--green);">✓ 已添加</span>
        </div>`;
      });
      updateStats();
      renderMedia();
      setTimeout(() => toast('已上传 ' + files.length + ' 个文件'), 500);
    }

    // Drag and drop
    const dropZone = document.getElementById('drop-zone');
    if (dropZone) {
      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
    }

    document.querySelector('.admin-avatar').addEventListener('click', function() {
      if (confirm('确定要退出登录吗？')) location.href = 'login.html';
    });

    updateStats();
    renderMedia();
  </script>
</body>
</html>
