<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内容中心 · NOVA</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-header { padding: 60px 0; text-align: center; background: var(--surface); }
    .page-header h1 { font-family: var(--font-display); font-size: 36px; margin-bottom: 12px; }
    .page-header p { color: var(--muted); max-width: 500px; margin: 0 auto; }

    .content-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
    @media (max-width: 992px) { .content-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 576px) { .content-grid { grid-template-columns: 1fr; } }

    .article-card { background: var(--surface); border-radius: var(--radius-lg); overflow: hidden; transition: all 0.3s; }
    .article-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .article-img { aspect-ratio: 16/10; background: linear-gradient(135deg, #e8e8e8, #d8d8d8); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; }
    .article-body { padding: 20px; }
    .article-tag { display: inline-block; padding: 4px 8px; background: var(--accent); color: white; font-size: 11px; border-radius: 4px; margin-bottom: 12px; }
    .article-card h3 { font-size: 16px; margin-bottom: 8px; line-height: 1.4; }
    .article-card p { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
    .article-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--muted); }
    .article-author { width: 24px; height: 24px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }

    .featured-article { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; margin-bottom: 60px; }
    @media (max-width: 768px) { .featured-article { grid-template-columns: 1fr; } }
    .featured-img { aspect-ratio: 16/10; background: linear-gradient(135deg, #e8e8e8, #d8d8d8); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; color: var(--muted); }
    .featured-content { display: flex; flex-direction: column; justify-content: center; }
    .featured-content h2 { font-family: var(--font-display); font-size: 28px; margin-bottom: 16px; line-height: 1.3; }
    .featured-content p { color: var(--muted); line-height: 1.8; margin-bottom: 20px; }

    .category-tabs { display: flex; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
    .category-tab { padding: 10px 20px; border: 1px solid var(--border); border-radius: 999px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .category-tab:hover, .category-tab.active { background: var(--fg); color: white; border-color: var(--fg); }
  </style>
</head>
<body>
  <header class="topnav">
    <div class="container topnav-inner">
      <a href="index.html" class="logo">NOVA</a>
      <nav class="nav-links">
        <a href="products.html">产品</a>
        <a href="about.html">品牌</a>
        <a href="content.html" class="active">内容</a>
        <a href="stores.html">门店</a>
        <a href="contact.html">联系我们</a>
      </nav>
      <div class="nav-actions">
        <a href="member.html" class="btn btn-ghost">登录</a>
        <a href="cart.html" class="btn btn-ghost">🛒</a>
      </div>
    </div>
  </header>

  <main>
    <div class="page-header">
      <div class="container">
        <h1>内容中心</h1>
        <p>发现生活美学灵感，获取穿搭建议和品牌资讯</p>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div class="featured-article" id="featured-article"></div>

        <div class="category-tabs" id="category-tabs"></div>
        <div class="content-grid" id="article-grid"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding:0;">
        <span>© 2026 NOVA Design Co. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    (function(){
      var articles = JSON.parse(localStorage.getItem('nova_articles') || '[]');
      var featuredEl = document.getElementById('featured-article');
      var tabsEl = document.getElementById('category-tabs');
      var gridEl = document.getElementById('article-grid');
      var currentCat = '';

      var categories = [''];
      articles.forEach(function(a) { if (a.category && categories.indexOf(a.category) < 0) categories.push(a.category); });

      function renderFeatured() {
        var top = articles[0];
        if (!top) {
          featuredEl.style.display = 'none';
          return;
        }
        featuredEl.innerHTML = '<div class="featured-img">[ 封面图 16:10 ]</div>' +
          '<div class="featured-content">' +
          '<span class="article-tag">' + (top.category||'生活方式') + '</span>' +
          '<h2>' + top.title + '</h2>' +
          '<p>' + (top.content||'').substring(0,80) + '...</p>' +
          '<div class="article-meta">' +
          '<span class="article-author">编</span>' +
          '<span>' + (top.date||'') + '</span>' +
          '<span>阅读 ' + (top.views||0).toLocaleString() + '</span>' +
          '</div></div>';
      }

      function renderGrid() {
        var filtered = currentCat ? articles.filter(function(a){ return a.category === currentCat; }) : articles;
        var page = filtered.slice(1);
        if (!page.length) {
          gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;">暂无文章，请从后台添加</p>';
          return;
        }
        gridEl.innerHTML = page.map(function(a) {
          return '<article class="article-card">' +
            '<div class="article-img">文章配图</div>' +
            '<div class="article-body">' +
            '<span class="article-tag">' + (a.category||'生活方式') + '</span>' +
            '<h3>' + a.title + '</h3>' +
            '<p>' + (a.content||'').substring(0,50) + '...</p>' +
            '<div class="article-meta">' +
            '<span class="article-author">编</span>' +
            '<span>' + (a.date||'') + '</span>' +
            '<span>阅读 ' + (a.views||0).toLocaleString() + '</span>' +
            '</div></div></article>';
        }).join('');
      }

      tabsEl.innerHTML = categories.map(function(c) {
        return '<span class="category-tab' + (c===''?' active':'') + '" data-cat="' + c + '">' + (c||'全部') + '</span>';
      }).join('');

      tabsEl.addEventListener('click', function(e) {
        if (e.target.classList.contains('category-tab')) {
          tabsEl.querySelectorAll('.category-tab').forEach(function(t){ t.classList.remove('active'); });
          e.target.classList.add('active');
          currentCat = e.target.dataset.cat;
          renderGrid();
        }
      });

      renderFeatured();
      renderGrid();
    })();
  </script>
</body>
</html>
